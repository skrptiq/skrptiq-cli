name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  BINARY_NAME: skrptiq

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - os: macos-13
            goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            suffix: linux-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            suffix: linux-arm64
            cross: true
          - os: windows-latest
            goos: windows
            goarch: amd64
            suffix: windows-amd64
            ext: .exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout CLI
        uses: actions/checkout@v4
        with:
          path: skrptiq-cli

      - name: Checkout engine (app repo)
        uses: actions/checkout@v4
        with:
          repository: skrptiq/skrptiq-app
          path: skrptiq-app
          token: ${{ secrets.ENGINE_ACCESS_TOKEN || github.token }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: skrptiq-cli/go.mod
          cache-dependency-path: skrptiq-cli/go.sum

      - name: Install cross-compiler (Linux ARM64)
        if: matrix.cross && matrix.goos == 'linux' && matrix.goarch == 'arm64'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        working-directory: skrptiq-cli
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          CC: ${{ matrix.cross && matrix.goarch == 'arm64' && 'aarch64-linux-gnu-gcc' || '' }}
        run: |
          VERSION=${GITHUB_REF_NAME}
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LDFLAGS="-X github.com/skrptiq/skrptiq-cli/internal/version.Version=${VERSION}"
          LDFLAGS="${LDFLAGS} -X github.com/skrptiq/skrptiq-cli/internal/version.Commit=${COMMIT}"
          LDFLAGS="${LDFLAGS} -X github.com/skrptiq/skrptiq-cli/internal/version.Date=${DATE}"
          go build -ldflags "${LDFLAGS}" -o ../dist/${{ env.BINARY_NAME }}-${{ matrix.suffix }}${{ matrix.ext }} .

      - name: Generate checksum
        shell: bash
        run: |
          cd dist
          sha256sum ${{ env.BINARY_NAME }}-${{ matrix.suffix }}${{ matrix.ext }} > ${{ env.BINARY_NAME }}-${{ matrix.suffix }}.sha256 2>/dev/null || \
          shasum -a 256 ${{ env.BINARY_NAME }}-${{ matrix.suffix }}${{ matrix.ext }} > ${{ env.BINARY_NAME }}-${{ matrix.suffix }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.suffix }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
